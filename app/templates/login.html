<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDG Serrurerie — Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f6fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo {
            color: #004B6B;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .sous-titre {
            color: #888;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #004B6B; }
        .btn {
            background: #004B6B;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .btn:hover { background: #005F8A; }
        .erreur {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>

<body>

<div class="login-card">
    <div class="logo">CDG Serrurerie</div>
    <div class="sous-titre">Accès dashboard interne</div>
    <div class="erreur" id="erreur"></div>
    <div class="form-group">
        <label>Identifiant</label>
        <input type="text" id="username" placeholder="Nom d'utilisateur">
    </div>
    <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="seConnecter()">Se connecter</button>
</div>

<script>
async function seConnecter() {
    const username = document.getElementById("username").value.trim()
    const password = document.getElementById("password").value.trim()

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    })

    if (res.ok) {
        window.location.href = "/dashboard"
    } else {
        const erreur = document.getElementById("erreur")
        erreur.textContent = "Identifiant ou mot de passe incorrect."
        erreur.style.display = "block"
    }
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") seConnecter()
})
</script>

</body>
</html>
